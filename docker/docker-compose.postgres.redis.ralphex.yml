version: "3.9"

networks:
  ralphex_default:
    name: ralphex_default

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    volumes:
#      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ralphex_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
      

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
#    volumes:
#      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ralphex_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
#  redis-data:
